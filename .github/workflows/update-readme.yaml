name: Update README Algorithm List

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00 UTC
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "src/SortAlgorithm/Algorithms/**/*.cs"

jobs:
  update-readme:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.SYNCED_ACTIONS_BOT_APPID }}
          private-key: ${{ secrets.SYNCED_ACTIONS_BOT_PRIVATE_KEY }}
          permission-contents: write
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Update algorithm list
        run: python3 scripts/update-readme-algorithms.py
      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md is already up to date, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github-actions:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git add README.md
          git commit -m 'docs: update algorithm list in README' -m "updated in run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
