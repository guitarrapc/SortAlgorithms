name: Benchmark

on:
  workflow_dispatch:
    inputs:
      benchmark:
        type: choice
        description: Specify benchmark name to run. Use "*" to run all benchmarks.
        default: "*"
        options:
          - "*"
          - "*AdaptiveBenchmark*"
          - "*DistributionBenchmark*"
          - "*ExchangeBenchmark*"
          - "*HeapBenchmark*"
          - "*InsertionBenchmark*"
          - "*MergeBenchmark*"
          - "*NetworkBenchmark*"
          - "*PartitionBenchmark*"
          - "*SelectionBenchmark*"
          - "*TreeBenchmark*"
          - "*IntKeyBenchmark*"
          - "*StringBenchmark*"

jobs:
  benchmark:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 60 # "*" runs ~1,400 benchmark cases at roughly 1s each (in-process, 6 iterations x 48ms)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          dotnet-version: 10.0.x
      - name: dotnet build
        run: dotnet build -c Release
      - name: benchmark
        id: benchmark
        run: |
          dotnet run -c Release --no-build --no-launch-profile --project ./src/SortAlgorithm.Benchmark/SortAlgorithm.Benchmark.csproj -- --filter "${FILTER}"
          echo "result=success" >> $GITHUB_OUTPUT
        env:
          FILTER: ${{ inputs.benchmark }}
      - name: Check benchmark result
        if: ${{ steps.benchmark.outputs.result != 'success' }}
        run: exit 1

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: BenchmarkDotNet.Artifacts
          path: BenchmarkDotNet.Artifacts/
          if-no-files-found: error

      - name: Output results to JobSummary
        run: |
          for file in $(find BenchmarkDotNet.Artifacts/results -name "*.md" | head -n 1); do
            machine_info=$(sed -n 's/^[[:space:]]*//; /^\|/p' "$file" | grep -v "|")
            echo "$machine_info" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          for file in $(find BenchmarkDotNet.Artifacts/results -name "*.md" | sort); do
            title=$(basename "$file" .md | sed 's/-report-default//g')
            content=$(sed -n 's/^[[:space:]]*//; /^\|/p' "$file" | grep "|")
            echo "## $title" >> $GITHUB_STEP_SUMMARY
            echo "$content" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

  update-readme:
    name: update README benchmark link
    needs: [benchmark]
    if: ${{ inputs.benchmark == '*' }}
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.SYNCED_ACTIONS_BOT_APPID }}
          private-key: ${{ secrets.SYNCED_ACTIONS_BOT_PRIVATE_KEY }}
          permission-contents: write
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Update README.md benchmark report link
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github-actions:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase FETCH_HEAD

          sed -E -i 's|(https://github\.com/[^/]+/[^/]+/actions/runs/)[0-9]+|\1${{ github.run_id }}|g' README.md

          git add README.md
          git commit -m 'docs: update benchmark report link' -m "updated in run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ job.check_run_id }}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
